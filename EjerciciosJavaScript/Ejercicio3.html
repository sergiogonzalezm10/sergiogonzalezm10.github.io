    function promedio(num1, num2) {
        let media = (num1 + num2) / 2;
        return media;
    };

    console.log(promedio(5,5));

    // Ejercicio 3
    function comprobarNumero(numero) {
        if (numero > 0) {
            return `${numero} es Positivo`;
        } else if (numero < 0) {
            return `${numero} es Negativo`;
        } else {
            return `${numero} es Cero`
        }
    };

    console.log(comprobarNumero(1));

    // Ejercicio 4
    function esBisiesto(año) {
        if (( año % 4 === 0 && año % 100 !== 0 ) || ( año % 400 === 0)){
            return true;
        } else {
            return false;
        }
    };

    console.log("Es bisiesto: " + esBisiesto(2024));
