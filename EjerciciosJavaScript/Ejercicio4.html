    // Ejercicio 2
    function mayorNumero(numeromayor) {
        let mayor = numeromayor[0];
        for (let i = 1; i < numeromayor.length; i++) {
            if ( numeromayor[i] > mayor) {
                mayor = numeromayor[i];
            }
        }
        return mayor;
    }

    let array = [ 2 , 10 , 6 , 20 ,  15];
    console.log(mayorNumero(array));

    // Ejercicio 4
    function mostrarObjeto(obj) {
        let claves = Object.keys(obj);   // obtenemos las claves
        let valores = Object.values(obj); // obtenemos los valores
        let resultado = "";

        for (let i = 0; i < claves.length; i++) {
            resultado += `${claves[i]}: ${valores[i]}\n`;
        }

        return resultado;
    }

    let personaEjemplo = { nombre: "Ana", edad: 30, ciudad: "Barcelona" };
    console.log(mostrarObjeto(personaEjemplo));
