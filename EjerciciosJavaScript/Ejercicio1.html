<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio1</title>
</head>
<body>
<h1 id="titulo">Calculadora</h1>
<h3>Dime tu nombre y edad:</h3>
<div id="mensaje"></div>
<br>
<input type="text" id="nombre" placeholder="Nombre">
<input type="number" id="edad" min="0" max="120" placeholder="Edad">
<button id="boton">Enviar</button>
<br>
<br>
<input type="number" id="numero1" placeholder="Dame un número">
<input type="number" id="numero2" placeholder="Dame otro numero">
<p>Resultado: <span id="resultado"></span></p>
<button id="suma">+</button>
<button id="resta">-</button>
<button id="multiplicacion">*</button>
<button id="division">/</button>
</body>
<script>
    document.getElementById('titulo');
    titulo.style.color = 'red';
    titulo.style.fontSize = '50px';

    const nombre = document.getElementById('nombre');
    const edad = document.getElementById('edad');
    const mensaje = document.getElementById('mensaje');
    const boton = document.getElementById('boton');

    boton.addEventListener('click', function (){
        if ( nombre.value === "" || edad.value === "") {
            mensaje.textContent = "Introduce la información pedida";
        } else if ( edad.value <= "0") {
            mensaje.textContent = "Introduce valores correctos";
        } else {
            mensaje.textContent = `Hola soy ${nombre.value} y tengo ${edad.value} años`;
        }
    });

    const numero1 = document.getElementById('numero1');
    const numero2 = document.getElementById('numero2');
    let resultado = document.getElementById('resultado');

    document.querySelector("#suma").addEventListener('click', function (){
        if ( numero1.value === "" || numero2.value === "" ) {
            resultado.textContent = "Introduce números válidos";
        } else {
            let calculo = Number(numero1.value) + Number(numero2.value);
            resultado.textContent = calculo;
        }
    })
    document.querySelector("#resta").addEventListener('click', function (){
        if ( numero1.value === "" || numero2.value === "" ) {
            resultado.textContent = "Introduce números válidos";
        } else {
            let calculo = Number(numero1.value) - Number(numero2.value);
            resultado.textContent = calculo;
        }
    })

    document.querySelector("#multiplicacion").addEventListener('click', function (){
        if ( numero1.value === "" || numero2.value === "" ) {
            resultado.textContent = "Introduce números válidos";
        } else {
            let calculo = Number(numero1.value) * Number(numero2.value);
            resultado.textContent = calculo;
        }
    })

    document.querySelector("#division").addEventListener('click', function (){
        if ( numero1.value === "" || numero2.value === "" ) {
            resultado.textContent = "Introduce números válidos";
        }
        else if (numero2.value === "0" ) {
            resultado.textContent = "No se puede dividir entre 0";
        } else {
            let calculo = Number(numero1.value) / Number(numero2.value);
            resultado.textContent = calculo;
        }
    })
</script>
</html>
