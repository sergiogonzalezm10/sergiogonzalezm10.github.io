<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        form {
            background-color: #f9f9f9;
            padding: 15px;
            border: 1px solid #ccc;
            width: 300px;
            margin-bottom: 20px;
        }
        form p {
            margin: 10px 0;
        }
        table {
            border-collapse: collapse;
            margin-top: 15px;
            width: 500px;
        }
        th, td {
            padding: 8px;
            text-align: left;
        }
    </style>
</head>
<body>

<h1>Ejercicio 2: Inserción de Usuarios</h1>

<form id="formulario-usuario">
    <p>
        <label for="txt-nombre">Nombre:</label><br>
        <input type="text" id="txt-nombre" required>
    </p>
    <p>
        <label for="txt-apellidos">Apellidos:</label><br>
        <input type="text" id="txt-apellidos" required>
    </p>
    <p>
        <label for="txt-edad">Edad:</label><br>
        <input type="number" id="txt-edad" required>
    </p>
    <p>
        <label for="txt-ciudad">Ciudad:</label><br>
        <input type="text" id="txt-ciudad" required>
    </p>
    <button type="submit">Agregar a la Tabla</button>
</form>

<table border="1" id="tabla-datos">
    <thead>
    <tr>
        <th>Nombre</th>
        <th>Apellidos</th>
        <th>Edad</th>
        <th>Ciudad</th>
    </tr>
    </thead>
    <tbody id="cuerpo-tabla">
    </tbody>
</table>

<script>
    // FUNCIÓN SOLICITADA: Crea la estructura de la fila en memoria y la devuelve
    function crearFila(nombre, apellidos, edad, ciudad) {
        // Creamos un elemento TR usando la sintaxis de jQuery
        const $nuevaFila = $('<tr></tr>');

        // Insertamos el contenido estructurado de las celdas (TD)
        $nuevaFila.html(`
            <td>${nombre}</td>
            <td>${apellidos}</td>
            <td>${edad}</td>
            <td>${ciudad}</td>
        `);

        // Devolvemos el nodo TR listo para ser usado
        return $nuevaFila;
    }

    // Controlador del evento submit del formulario
    $('#formulario-usuario').on('submit', function(e) {
        // VITAL: Evita la recarga de la página al procesar el formulario
        e.preventDefault();

        // Recolección y limpieza de los valores de los inputs con jQuery
        const nombre = $('#txt-nombre').val().trim();
        const apellidos = $('#txt-apellidos').val().trim();
        const edad = $('#txt-edad').val().trim();
        const ciudad = $('#txt-ciudad').val().trim();

        // Invocamos la función para generar la fila estructurada
        const filaGenerada = crearFila(nombre, apellidos, edad, ciudad);

        // Adjuntamos (append) la fila devuelta al tbody de la tabla
        $('#cuerpo-tabla').append(filaGenerada);

        // Limpieza automática del formulario para poder introducir un nuevo registro
        this.reset();
    });
</script>

</body>
</html>
