<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 1 RETO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>

<h1>Ejercicio 1 RETO: Consulta de Usuarios</h1>

<button type="button" onclick="ejecutarProceso()">Pulsa y observa la consola</button>

<div id="json-texto" style="margin-top: 15px;"></div>
<div id="recuperado-texto"></div>

<table border="1" id="tabla-datos" style="margin-top: 10px;">
    <thead>
    <tr>
        <th>Nombre</th>
        <th>Apellidos</th>
        <th>Edad</th>
        <th>Ciudad</th>
    </tr>
    </thead>
    <tbody>
    <tr>
        <td id="celda-nombre"></td>
        <td id="celda-apellidos"></td>
        <td id="celda-edad"></td>
        <td id="celda-ciudad"></td>
    </tr>
    </tbody>
</table>

<script>
    function convertirAJSON(objeto) {
        const resultado = JSON.stringify(objeto);
        console.log("Serializado:", resultado);
        return resultado;
    }

    function convertirAObjeto(jsonStr) {
        const resultado = JSON.parse(jsonStr);
        console.log("Deserializado:", resultado);
        return resultado;
    }

    function ejecutarProceso() {

        const persona = {
            nombre: "Alberto",
            apellidos: "Ramos",
            edad: 26,
            ciudad: "Granada"
        };

        // Proceso de Serialización
        const jsonSerializado = convertirAJSON(persona);
        // Selección y asignación con jQuery ($) en lugar de document.getElementById().innerText
        $('#json-texto').text(jsonSerializado);

        // Proceso de Deserialización
        const objetoRecuperado = convertirAObjeto(jsonSerializado);

        // Mostrar texto recuperado con jQuery
        $('#recuperado-texto').text(
            "Recuperado: nombre:" + objetoRecuperado.nombre +
            ", apellidos:" + objetoRecuperado.apellidos +
            ", edad:" + objetoRecuperado.edad +
            ", ciudad:" + objetoRecuperado.ciudad
        );

        $('#celda-nombre').text(objetoRecuperado.nombre);
        $('#celda-apellidos').text(objetoRecuperado.apellidos);
        $('#celda-edad').text(objetoRecuperado.edad);
        $('#celda-ciudad').text(objetoRecuperado.ciudad);
    }
</script>

</body>
</html>
