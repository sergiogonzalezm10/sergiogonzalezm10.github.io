<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ej4.html</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .contenedor-hobbies {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding: 10px;
            border: 1px solid #ccc;
            margin: 10px 0;
        }
        .item-hobby {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        input:disabled + label {
            color: #ccc;
        }
    </style>
</head>
<body>

<h1>Ejercicio 4: Envío y Recepción (AJAX)</h1>

<form id="formulario">
    <input type="text" id="nombre" placeholder="Nombre">
    <input type="text" id="apellidos" placeholder="Apellidos">
    <input type="number" id="edad" placeholder="Edad">
    <input type="text" id="ciudad" placeholder="Ciudad">

    <fieldset>
        <legend>Hobbies (Máximo 3):</legend>
        <div class="contenedor-hobbies">
            <div class="item-hobby"><input type="checkbox" name="hobbies[]" value="Deporte" id="h1"><label for="h1">Deporte</label></div>
            <div class="item-hobby"><input type="checkbox" name="hobbies[]" value="Lectura" id="h2"><label for="h2">Lectura</label></div>
            <div class="item-hobby"><input type="checkbox" name="hobbies[]" value="Música" id="h3"><label for="h3">Música</label></div>
            <div class="item-hobby"><input type="checkbox" name="hobbies[]" value="Juegos" id="h4"><label for="h4">Juegos</label></div>
            <div class="item-hobby"><input type="checkbox" name="hobbies[]" value="Cine" id="h5"><label for="h5">Cine</label></div>
            <div class="item-hobby"><input type="checkbox" name="hobbies[]" value="Teatro" id="h6"><label for="h6">Teatro</label></div>
            <div class="item-hobby"><input type="checkbox" name="hobbies[]" value="Coleccionismo" id="h7"><label for="h7">Coleccionismo</label></div>
            <div class="item-hobby"><input type="checkbox" name="hobbies[]" value="Bricolaje" id="h8"><label for="h8">Bricolaje</label></div>
            <div class="item-hobby"><input type="checkbox" name="hobbies[]" value="Cosplay" id="h9"><label for="h9">Cosplay</label></div>
        </div>
    </fieldset>

    <button type="button" id="btn-ejecutar">Pulsa para insertar</button>
</form>

<table border="1" style="margin-top: 20px; width: 100%; border-collapse: collapse;">
    <thead>
    <tr style="background-color: #f2f2f2;">
        <th>Nombre</th>
        <th>Apellidos</th>
        <th>Edad</th>
        <th>Ciudad</th>
        <th>Hobbies</th>
    </tr>
    </thead>
    <tbody id="cuerpo-tabla"></tbody>
</table>

<div id="estadisticas" style="margin-top: 15px;"></div>

<script>
    let listaPersonas = [];

    function generarTR(persona) {
        let fila = $('<tr></tr>');
        fila.append('<td>' + persona.nombre + '</td>');
        fila.append('<td>' + persona.apellidos + '</td>');
        fila.append('<td>' + persona.edad + '</td>');
        fila.append('<td>' + persona.ciudad + '</td>');
        fila.append('<td>' + persona.hobbies.join(', ') + '</td>');
        return fila;
    }

    function enviarYCalcular() {
        $.ajax({
            url: "https://lm.iesnervion.es/eco.php",
            type: "POST",
            data: JSON.stringify(listaPersonas),
            contentType: "application/json",
            dataType: "json",
            success: function(respuesta) {
                if (respuesta) {
                    $('#estadisticas').html(
                        '<strong>Suma:</strong> ' + respuesta.suma + '<br>' +
                        '<strong>Media:</strong> ' + respuesta.media + '<br>' +
                        '<strong>Máximo:</strong> ' + respuesta.max + '<br>' +
                        '<strong>Mínimo:</strong> ' + respuesta.min
                    );
                }
            },
            error: function(error) {
                console.error("Error en la petición", error);
            }
        });
    }

    $(document).ready(function() {
        $('input[name="hobbies[]"]').on('change', function() {
            let marcados = $('input[name="hobbies[]"]:checked').length;
            if (marcados >= 3) {
                $('input[name="hobbies[]"]').not(':checked').prop('disabled', true);
            } else {
                $('input[name="hobbies[]"]').prop('disabled', false);
            }
        });

        $('#btn-ejecutar').on('click', function() {
            let nombre = $('#nombre').val();
            let edad = $('#edad').val();

            if (nombre === '' || edad === '') return alert('Faltan datos');

            let hobbiesSeleccionados = $('input[name="hobbies[]"]:checked').map(function() {
                return $(this).val();
            }).get();

            let persona = {
                nombre: nombre,
                apellidos: $('#apellidos').val(),
                edad: parseInt(edad),
                ciudad: $('#ciudad').val(),
                hobbies: hobbiesSeleccionados
            };

            listaPersonas.push(persona);

            $('#cuerpo-tabla').empty();
            listaPersonas.forEach(p => {
                $('#cuerpo-tabla').append(generarTR(p));
            });

            enviarYCalcular();

            $('#formulario')[0].reset();
            $('input[name="hobbies[]"]').prop('disabled', false);
        });
    });
</script>

</body>
</html>
