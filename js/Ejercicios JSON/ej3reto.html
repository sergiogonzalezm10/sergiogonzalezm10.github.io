<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3 Reto</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        form { background-color: #f9f9f9; padding: 15px; border: 1px solid #ccc; width: 350px; margin-bottom: 20px; }
        form p { margin: 10px 0; }
        .zona-checkboxes { margin-top: 5px; padding: 5px; border: 1px dashed #bbb; background: #fff; }
        .zona-checkboxes label { margin-right: 10px; display: inline-block; cursor: pointer; }
        table { border-collapse: collapse; margin-top: 15px; width: 650px; }
        th, td { padding: 8px; text-align: left; }
        tr.fila-usuario { cursor: pointer; }
        tr.fila-usuario:hover { background-color: #ffcccc; }
        #panel-estadisticas { background-color: #eef; padding: 10px; border: 1px solid #aad; width: 350px; margin-top: 15px; border-radius: 4px; }
        #panel-estadisticas p { margin: 5px 0; font-weight: bold; }
    </style>
</head>
<body>

<h1>Ejercicio 3 Reto: Limitación de Hobbies en Tiempo Real</h1>

<form id="formulario-usuario">
    <p>
        <label for="txt-nombre">Nombre:</label><br>
        <input type="text" id="txt-nombre">
    </p>
    <p>
        <label for="txt-apellidos">Apellidos:</label><br>
        <input type="text" id="txt-apellidos">
    </p>
    <p>
        <label for="txt-edad">Edad:</label><br>
        <input type="number" id="txt-edad">
    </p>
    <p>
        <label for="txt-ciudad">Ciudad:</label><br>
        <input type="text" id="txt-ciudad">
    </p>
    <p>
        <label>Hobbies (Máximo 3):</label><br>
    <div class="zona-checkboxes">
        <label><input type="checkbox" name="hobbies[]" value="Deporte"> Deporte</label>
        <label><input type="checkbox" name="hobbies[]" value="Lectura"> Lectura</label>
        <label><input type="checkbox" name="hobbies[]" value="Música"> Música</label>
        <label><input type="checkbox" name="hobbies[]" value="Juegos"> Juegos</label>
        <label><input type="checkbox" name="hobbies[]" value="Cine"> Cine</label>
        <label><input type="checkbox" name="hobbies[]" value="Teatro"> Teatro</label>
        <label><input type="checkbox" name="hobbies[]" value="Coleccionismo"> Coleccionismo</label>
        <label><input type="checkbox" name="hobbies[]" value="Bricolaje"> Bricolaje</label>
        <label><input type="checkbox" name="hobbies[]" value="Cosplay"> Cosplay</label>
    </div>
    </p>
    <button type="submit">Agregar Usuario</button>
</form>

<table border="1" id="tabla-datos">
    <thead>
    <tr>
        <th>Nombre</th>
        <th>Apellidos</th>
        <th>Edad</th>
        <th>Ciudad</th>
        <th>Hobbies</th>
    </tr>
    </thead>
    <tbody id="cuerpo-tabla">
    </tbody>
</table>

<div id="panel-estadisticas">
    <h3>Estadísticas de Edad</h3>
    <p>Suma: <span id="est-suma">0</span></p>
    <p>Media: <span id="est-media">0</span></p>
    <p>Máximo: <span id="est-max">0</span></p>
    <p>Mínimo: <span id="est-min">0</span></p>
</div>

<script>
    let listaUsuarios = [];

    // =========================================================================
    // LÓGICA DEL RETO: LIMITAR CHECKBOXES A UN MÁXIMO DE 3 EN TIEMPO REAL
    // =========================================================================
    $('input[name="hobbies[]"]').on('change', function() {
        // Seleccionamos todos los checkboxes de hobbies y filtramos los que están marcados
        const marcados = $('input[name="hobbies[]"]').filter(':checked').length;

        if (marcados >= 3) {
            // Si hay 3 o más seleccionados, deshabilitamos los que NO estén marcados (:not(:checked))
            $('input[name="hobbies[]"]').not(':checked').prop('disabled', true);
        } else {
            // Si hay menos de 3, nos aseguramos de que todos vuelvan a estar habilitados
            $('input[name="hobbies[]"]').prop('disabled', false);
        }
    });

    // Funciones de renderizado y persistencia de datos (Heredadas de los retos anteriores)
    function generaTR(indice, usuario) {
        const hobbiesTexto = usuario.hobbies.length > 0 ? usuario.hobbies.join(", ") : "Ninguno";

        const $nuevaFila = $(`
            <tr id="fila-${indice}" class="fila-usuario">
                <td>${usuario.nombre}</td>
                <td>${usuario.apellidos}</td>
                <td>${usuario.edad}</td>
                <td>${usuario.ciudad}</td>
                <td>${hobbiesTexto}</td>
            </tr>
        `);

        $nuevaFila.attr('onclick', `eliminarRegistro(${indice})`);
        return $nuevaFila;
    }

    function generaTabla(listaDeDatos) {
        const $tbody = $('#cuerpo-tabla');
        $tbody.empty();

        listaDeDatos.forEach(function(usuario, indice) {
            const $filaHtml = generaTR(indice, usuario);
            $tbody.append($filaHtml);
        });

        actualizarEstadisticas(listaDeDatos);
    }

    function agregarAlArray(nombre, apellidos, edad, ciudad, hobbiesSeleccionados) {
        const nuevoUsuario = {
            nombre: nombre,
            apellidos: apellidos,
            edad: parseInt(edad),
            ciudad: ciudad,
            hobbies: hobbiesSeleccionados
        };

        listaUsuarios.push(nuevoUsuario);
        generaTabla(listaUsuarios);
    }

    function eliminarRegistro(indice) {
        listaUsuarios.splice(indice, 1);
        generaTabla(listaUsuarios);
    }

    function actualizarEstadisticas(usuarios) {
        if (usuarios.length === 0) {
            $('#est-suma').text(0);
            $('#est-media').text(0);
            $('#est-max').text(0);
            $('#est-min').text(0);
            return;
        }

        let suma = 0;
        let edades = [];

        usuarios.forEach(function(u) {
            suma += u.edad;
            edades.push(u.edad);
        });

        let media = suma / usuarios.length;
        let maximo = Math.max(...edades);
        let minimo = Math.min(...edades);

        $('#est-suma').text(suma);
        $('#est-media').text(media.toFixed(1));
        $('#est-max').text(maximo);
        $('#est-min').text(minimo);
    }

    $('#formulario-usuario').on('submit', function(e) {
        e.preventDefault();

        const nombre = $('#txt-nombre').val().trim();
        const apellidos = $('#txt-apellidos').val().trim();
        const edadTexto = $('#txt-edad').val().trim();
        const ciudad = $('#txt-ciudad').val().trim();

        if (nombre === "") { alert("El campo Nombre es obligatorio."); return; }
        if (apellidos === "") { alert("El campo Apellidos es obligatorio."); return; }
        if (edadTexto === "") { alert("El campo Edad es obligatorio."); return; }
        if (ciudad === "") { alert("El campo Ciudad es obligatorio."); return; }

        const hobbiesListado = $('input[name="hobbies[]"]')
            .filter(':checked')
            .map(function () {
                return $(this).val();
            })
            .get();

        agregarAlArray(nombre, apellidos, edadTexto, ciudad, hobbiesListado);

        // Al resetear el formulario se limpian los inputs, pero debemos reactivar los checkboxes bloqueados manualmente
        this.reset();
        $('input[name="hobbies[]"]').prop('disabled', false);
    });
</script>

</body>
</html>
