<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        div {
            border: 5px dotted red;
            display: inline-block;
            width: 100px;
            height: 100px;
            border-left: 5px dashed blue;
            border-radius: 15px;
            box-shadow: black 3px 3px 5px;
            vertical-align: top;
        }

        .element {
             width: 100px;
             height: 100px;
             background: red;
            transition:
            background 3s,
            width 4s;
         }

        .element:hover {
            background: blue;
            width: 250px;
            transition:
             background 2s,
             width 1s;

        }
        .rainbow {
            width: 300px;
            height: 150px;
            border-radius: 150px 150px 0 0;
            animation: arcoiris 4s linear infinite;
            background-size: 100% 200%;
            background-image: linear-gradient(
                    to bottom,
                    red,
                    orange,
                    yellow,
                    green,
                    blue,
                    indigo,
                    violet
            );
        }

        @keyframes arcoiris {
            0%   { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

    </style>
</head>
<body>
<div>si</div>
<div>si</div>
<div class="element"></div>
<div class="rainbow"></div>
</body>
</html>
